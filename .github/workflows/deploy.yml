name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

# Necessary permissions to write built images to GitHub Container Registry (GHCR)
permissions:
  contents: read
  packages: write

jobs:
  # --- Stage 1: Run the App Test Suite ---
  test:
    name: Run Application Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup PHP environment matching your Dockerfile (PHP 8.4)
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite, bcmath, gd, intl
          coverage: none

      # Setup Node environment for asset compilation
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Cache Composer dependencies for faster subsequent runs
      - name: Get Composer Cache Directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer Dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      # Install Composer dependencies (including dev dependencies for PHPUnit)
      - name: Install PHP Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      # Install NPM dependencies & build production assets
      - name: Install and Build Frontend
        run: |
          npm ci
          npm run build

      # Configure Environment for local testing (Uses SQLite in-memory database)
      - name: Prepare Test Environment
        run: |
          cp .env.example .env
          php artisan key:generate
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"

      # Run Laravel tests (PHPUnit/Pest)
      - name: Execute Tests
        run: php artisan test
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
          APP_ENV: testing

  # --- Stage 2: Build and Push Docker Image (Only if tests pass) ---
  build-and-push:
    name: Build & Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    # Only run build/push on commits to main/master, not on pull requests
    if: github.event_name == 'push'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Set up Docker Buildx (highly recommended for building multi-stage images)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to the GitHub Container Registry (GHCR)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and Push the production multi-stage image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/jesse457/botaland-resort:latest
            ghcr.io/jesse457/botaland-resort:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
