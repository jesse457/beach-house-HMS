name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

# Necessary permissions to write built images to GitHub Container Registry (GHCR)
permissions:
  contents: read
  packages: write

env:
  PHP_VERSION: '8.4'
  NODE_VERSION: '20'
  # Image registry and name — uses the repo owner/name for consistent GHCR paths
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # --- Stage 1: Run the App Test Suite ---
  test:
    name: Run Application Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup PHP environment matching the Dockerfile (PHP 8.4)
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite, bcmath, gd, intl
          coverage: none

      # Setup Node environment for asset compilation
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Cache Composer dependencies for faster subsequent runs
      - name: Get Composer Cache Directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      # Cache Composer Dependencies
      - name: Cache Composer Dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      # Cache NPM dependencies
      - name: Cache NPM Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # Install Composer dependencies (including dev dependencies for testing)
      - name: Install PHP Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      # Install NPM dependencies & build production assets
      - name: Install and Build Frontend
        run: |
          npm ci
          npm run build

      # Copy .env.example and generate app key for testing
      - name: Prepare Test Environment
        run: |
          cp .env.example .env
          php artisan key:generate

      # Run Laravel tests (Pest PHP with SQLite in-memory)
      - name: Execute Tests
        run: php artisan test
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
          APP_ENV: testing

  # --- Stage 2: Build and Push Docker Image (Only if tests pass) ---
  build-and-push:
    name: Build & Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    # Only run build/push on commits to main/master, not on pull requests
    if: github.event_name == 'push'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Set up Docker Buildx for multi-stage builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to the GitHub Container Registry (GHCR)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata for Docker tags and labels
      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      # Build and Push the production multi-stage image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --- Stage 3: Deploy to VPS (Only runs on push/merge to main/master) ---
  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Execute remote SSH commands to deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          envs: GITHUB_TOKEN,REGISTRY
          script: |
            # 1. Log in to GitHub Container Registry inside the VPS
            echo $GITHUB_TOKEN | docker login $REGISTRY -u ${{ github.actor }} --password-stdin

            # 2. Navigate to your project directory on the VPS
            cd ~/project

            # 3. Pull the latest images from GHCR
            docker compose pull

            # # 4. Recreate and start the containers in the background
            docker compose up -d

            docker exec -it botaland_app php artisan optimize

            docker exec -it botaland_app php artisan migrate --force

            # # 5. Clean up old, unused Docker images to save VPS disk space
            docker image prune -f
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY: ${{ env.REGISTRY }}
